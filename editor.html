<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Редактор Smart Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            min-height: 100vh; color: #fff;
        }
        .editor-container {
            max-width: 1400px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
        }
        .panel {
            background: rgba(255,255,255,0.1); border-radius: 20px;
            padding: 25px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-family: 'Fredoka', cursive; font-size: 2em;
            text-align: center; margin-bottom: 25px;
            text-shadow: 0 0 20px #00ffff;
        }
        h2 {
            font-family: 'Fredoka', cursive; color: #00ffff;
            margin-bottom: 15px; font-size: 1.4em;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block; margin-bottom: 5px;
            font-weight: 700; color: #ffd700;
        }
        input, select, textarea {
            width: 100%; padding: 12px;
            border: 2px solid #00ffff; border-radius: 10px;
            background: rgba(0,0,0,0.3); color: #fff;
            font-family: 'Nunito', sans-serif; font-size: 1em;
        }
        input[type="color"] { height: 50px; cursor: pointer; }
        input:focus, select:focus, textarea:focus {
            outline: none; box-shadow: 0 0 15px rgba(0,255,255,0.5);
        }
        .btn {
            background: linear-gradient(135deg, #00ffff, #0080ff);
            color: #000; border: none; padding: 15px 30px;
            border-radius: 50px; font-family: 'Fredoka', cursive;
            font-size: 1.1em; font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 10px; transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0,255,255,0.6); }
        .btn-secondary { background: linear-gradient(135deg, #ff6b6b, #ff4757); }
        .btn-success { background: linear-gradient(135deg, #00ff88, #00cc66); }
        .question-item {
            background: rgba(0,0,0,0.3); border-radius: 15px;
            padding: 15px; margin-bottom: 15px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .question-item h3 { color: #ffd700; margin-bottom: 10px; }
        .option-row {
            display: flex; gap: 10px; margin-bottom: 8px; align-items: center;
        }
        .option-row input { flex: 1; }
        .option-row button {
            background: #ff4757; color: white; border: none;
            width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer; font-weight: bold;
        }
        .preview-frame {
            width: 100%; height: 500px; border: 3px solid #00ffff;
            border-radius: 15px; background: #000;
        }
        .code-box {
            background: #1a1a2e; border: 2px solid #00ffff;
            border-radius: 10px; padding: 15px;
            font-family: 'Courier New', monospace; font-size: 0.9em;
            color: #00ff88; overflow-x: auto; margin-top: 15px;
            white-space: pre-wrap; word-break: break-all;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 10px 20px; background: rgba(255,255,255,0.1);
            border: 2px solid #00ffff; border-radius: 10px;
            cursor: pointer; font-weight: 700; transition: all 0.3s;
        }
        .tab.active { background: #00ffff; color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 1024px) { .editor-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- Левая панель: Настройки -->
        <div class="panel">
            <h1>🎮 Редактор Smart Video Player</h1>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('basic')">⚙️ Основные</div>
                <div class="tab" onclick="switchTab('questions')">❓ Вопросы</div>
                <div class="tab" onclick="switchTab('design')">🎨 Дизайн</div>
                <div class="tab" onclick="switchTab('export')">📤 Экспорт</div>
            </div>

            <!-- Основные настройки -->
            <div id="tab-basic" class="tab-content active">
                <h2>Основные настройки</h2>
                <div class="form-group">
                    <label>📺 Ссылка на видео (MP4)</label>
                    <input type="text" id="videoUrl" value="https://www.w3schools.com/html/mov_bbb.mp4" placeholder="https://...video.mp4">
                </div>
                <div class="form-group">
                    <label>🏆 Название игры</label>
                    <input type="text" id="gameTitle" value="Smart Video Player">
                </div>
                <div class="form-group">
                    <label>🚀 Иконка прогресс-бара</label>
                    <select id="progressIcon">
                        <option value="🚀">🚀 Ракета</option>
                        <option value="⭐">⭐ Звезда</option>
                        <option value="🎯">🎯 Цель</option>
                        <option value="💫">💫 Комета</option>
                        <option value="">Без иконки</option>
                    </select>
                </div>
            </div>

            <!-- Вопросы -->
            <div id="tab-questions" class="tab-content">
                <h2>❓ Вопросы викторины</h2>
                <div id="questionsList"></div>
                <button class="btn" onclick="addQuestion()">+ Добавить вопрос</button>
            </div>

            <!-- Дизайн -->
            <div id="tab-design" class="tab-content">
                <h2>🎨 Настройки дизайна</h2>
                <div class="color-grid">
                    <div class="form-group">
                        <label>Фон (градиент 1)</label>
                        <input type="color" id="bgColor1" value="#0a0a2a">
                    </div>
                    <div class="form-group">
                        <label>Фон (градиент 2)</label>
                        <input type="color" id="bgColor2" value="#1a0033">
                    </div>
                    <div class="form-group">
                        <label>Основной цвет</label>
                        <input type="color" id="primaryColor" value="#00ffff">
                    </div>
                    <div class="form-group">
                        <label>Вторичный цвет</label>
                        <input type="color" id="secondaryColor" value="#0080ff">
                    </div>
                    <div class="form-group">
                        <label>Цвет кнопок</label>
                        <input type="color" id="btnColor" value="#667eea">
                    </div>
                    <div class="form-group">
                        <label>Цвет правильного ответа</label>
                        <input type="color" id="correctColor" value="#00ff88">
                    </div>
                    <div class="form-group">
                        <label>Цвет неправильного ответа</label>
                        <input type="color" id="wrongColor" value="#ff4757">
                    </div>
                    <div class="form-group">
                        <label>Цвет текста</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                </div>
                <div class="form-group">
                    <label>🌟 Фон со звёздами</label>
                    <select id="starfield">
                        <option value="true">Включить</option>
                        <option value="false">Выключить</option>
                    </select>
                </div>
            </div>

            <!-- Экспорт -->
            <div id="tab-export" class="tab-content">
                <h2>📤 Код для вставки</h2>
                <div class="form-group">
                    <label>🔗 URL вашего player.html</label>
                    <input type="text" id="playerUrl" placeholder="https://yoursite.com/player.html">
                </div>
                <button class="btn btn-success" onclick="generateCode()">🔄 Сгенерировать код</button>
                <button class="btn" onclick="copyCode()">📋 Копировать</button>
                <div class="code-box" id="exportCode"></div>
                <div id="stats" style="margin-top: 15px; color: #ffd700;"></div>
            </div>
        </div>

        <!-- Правая панель: Предпросмотр -->
        <div class="panel">
            <h2>👁️ Предпросмотр</h2>
            <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
            <button class="btn" onclick="updatePreview()" style="margin-top: 15px;">🔄 Обновить</button>
            <div id="previewStatus" style="margin-top: 10px; color: #ffd700;"></div>
        </div>
    </div>

    <script>
        let questions = [
            {
                time: 5,
                question: "Пример вопроса?",
                options: ["Вариант 1", "Вариант 2", "Вариант 3"],
                correct: "A",
                hint: "Подсказка"
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            renderQuestions();
            const playerUrl = window.location.href.replace('editor.html', 'player.html');
            document.getElementById('playerUrl').value = playerUrl;
            updatePreview();
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function renderQuestions() {
            const container = document.getElementById('questionsList');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                item.innerHTML = `
                    <h3>Вопрос #${index + 1} (на ${q.time} сек)</h3>
                    <div class="form-group">
                        <label>Время (сек)</label>
                        <input type="number" value="${q.time}" onchange="updateQuestion(${index}, 'time', parseInt(this.value))">
                    </div>
                    <div class="form-group">
                        <label>Текст вопроса</label>
                        <input type="text" value="${q.question}" onchange="updateQuestion(${index}, 'question', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Варианты ответов</label>
                        ${q.options.map((opt, i) => `
                            <div class="option-row">
                                <input type="text" value="${opt}" onchange="updateOption(${index}, ${i}, this.value)">
                                <button onclick="removeOption(${index}, ${i})">×</button>
                            </div>
                        `).join('')}
                        <button class="btn" style="padding: 8px; font-size: 0.9em; margin-top: 5px;" onclick="addOption(${index})">+ Вариант</button>
                    </div>
                    <div class="form-group">
                        <label>✅ Буква правильного ответа (A, B, C...)</label>
                        <input type="text" value="${q.correct}" maxlength="1" style="width: 60px; text-transform: uppercase;" onchange="updateQuestion(${index}, 'correct', this.value.toUpperCase())">
                    </div>
                    <div class="form-group">
                        <label>💡 Подсказка</label>
                        <input type="text" value="${q.hint}" onchange="updateQuestion(${index}, 'hint', this.value)">
                    </div>
                    <button class="btn btn-secondary" onclick="removeQuestion(${index})" style="margin-top: 10px;">🗑️ Удалить</button>
                `;
                container.appendChild(item);
            });
            updateStats();
        }

        function updateQuestion(index, field, value) {
            questions[index][field] = value;
            updateStats();
        }
        function updateOption(qIndex, oIndex, value) { questions[qIndex].options[oIndex] = value; }
        function addQuestion() {
            questions.push({
                time: questions.length > 0 ? questions[questions.length - 1].time + 10 : 5,
                question: "Новый вопрос?",
                options: ["Вариант 1", "Вариант 2", "Вариант 3"],
                correct: "A",
                hint: "Подсказка"
            });
            renderQuestions();
        }
        function removeQuestion(index) { questions.splice(index, 1); renderQuestions(); }
        function addOption(qIndex) { questions[qIndex].options.push("Новый вариант"); renderQuestions(); }
        function removeOption(qIndex, oIndex) { questions[qIndex].options.splice(oIndex, 1); renderQuestions(); }
        function updateStats() {
            const maxTime = questions.length > 0 ? Math.max(...questions.map(q => q.time)) : 0;
            document.getElementById('stats').innerHTML = `<p>📊 Вопросов: <strong>${questions.length}</strong> | ⏱️ Мин. видео: <strong>${maxTime + 10} сек</strong></p>`;
        }

        function generateConfig() {
            return {
                videoUrl: document.getElementById('videoUrl').value,
                gameTitle: document.getElementById('gameTitle').value,
                progressIcon: document.getElementById('progressIcon').value,
                questions: questions,
                design: {
                    bgColor1: document.getElementById('bgColor1').value,
                    bgColor2: document.getElementById('bgColor2').value,
                    primaryColor: document.getElementById('primaryColor').value,
                    secondaryColor: document.getElementById('secondaryColor').value,
                    btnColor: document.getElementById('btnColor').value,
                    correctColor: document.getElementById('correctColor').value,
                    wrongColor: document.getElementById('wrongColor').value,
                    textColor: document.getElementById('textColor').value,
                    starfield: document.getElementById('starfield').value === 'true'
                }
            };
        }

        function generateCode() {
            const config = generateConfig();
            const playerUrl = document.getElementById('playerUrl').value.trim();
            if (!playerUrl) { alert('⚠️ Укажите URL player.html'); return; }
            const configEncoded = btoa(unescape(encodeURIComponent(JSON.stringify(config))));
            document.getElementById('exportCode').textContent = `<iframe src="${playerUrl}?config=${configEncoded}" width="100%" height="600" frameborder="0" allowfullscreen allow="autoplay"></iframe>`;
            document.getElementById('previewStatus').textContent = '✅ Код готов! Скопируйте и вставьте.';
        }

        function copyCode() {
            const code = document.getElementById('exportCode').textContent;
            if (!code) { alert('⚠️ Сначала сгенерируйте код!'); return; }
            navigator.clipboard.writeText(code).then(() => alert('✅ Скопировано!'));
        }

        function updatePreview() {
            const config = generateConfig();
            const playerUrl = document.getElementById('playerUrl').value.trim() || window.location.href.replace('editor.html', 'player.html');
            const configEncoded = btoa(unescape(encodeURIComponent(JSON.stringify(config))));
            const frame = document.getElementById('previewFrame');
            frame.src = `${playerUrl}?config=${configEncoded}`;
            document.getElementById('previewStatus').textContent = '🔄 Предпросмотр обновлён.';
            frame.onload = () => console.log('✅ Preview loaded');
            frame.onerror = () => document.getElementById('previewStatus').textContent = '❌ Ошибка загрузки player.html';
        }
    </script>
</body>
</html>
